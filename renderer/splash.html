<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1c2a4a;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .title span {
      color: #e94560;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }
    .status {
      font-size: 12px;
      color: #a0a0a0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="title"><span>Fun</span>Sync Player</div>
  <div class="spinner"></div>
  <div class="status">Loading...</div>
</body>
</html>
