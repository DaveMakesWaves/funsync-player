appId: com.funsync.player
productName: FunSync Player
copyright: Copyright © 2026

directories:
  output: dist

files:
  - electron/**/*
  - renderer/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: backend-dist/
    to: backend
    filter:
      - "**/*"

win:
  icon: assets/icons/icon.ico
  target:
    - target: nsis
      arch: x64
  extraFiles:
    - from: ffmpeg/
      to: ffmpeg
      filter:
        - ffmpeg.exe
        - ffprobe.exe

linux:
  icon: assets/icons/icon.png
  category: Video
  target:
    - target: AppImage
      arch: x64
  desktop:
    Name: FunSync Player
    Comment: Video player with device integration for synchronized funscript playback
  extraFiles:
    - from: ffmpeg-linux/
      to: ffmpeg
      filter:
        - ffmpeg
        - ffprobe

nsis:
  oneClick: true
  perMachine: false
  allowElevation: true
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  uninstallDisplayName: FunSync Player

publish:
  provider: github
  owner: DaveMakesWaves
  repo: funsync-player

asar: true
