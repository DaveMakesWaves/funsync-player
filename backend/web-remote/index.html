<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FunSync">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FunSync Remote</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="256x256" href="./icons/icon-256.png">
  <link rel="apple-touch-icon" href="./icons/icon-256.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <button class="header__back icon-btn" id="backBtn" aria-label="Back" hidden></button>
      <h1 class="header__title" id="title"><span class="brand-accent">Fun</span>Sync</h1>
      <span class="header__count" id="count"></span>
      <button class="header__view icon-btn" id="refreshBtn" aria-label="Refresh library" title="Refresh library"></button>
      <button class="header__view icon-btn" id="viewToggle" aria-label="Toggle grid / list" title="Toggle grid / list"></button>
      <button class="header__view icon-btn" id="folderToggle" aria-label="Browse by folder" title="Browse by folder"></button>
    </header>
    <div class="controls" id="controls">
      <div class="controls__modes" role="tablist" id="modeTabs">
        <button class="controls__mode controls__mode--active" data-mode="library" role="tab">Library</button>
        <button class="controls__mode" data-mode="collections" role="tab">Collections</button>
        <button class="controls__mode" data-mode="playlists" role="tab">Playlists</button>
        <button class="controls__mode" data-mode="categories" role="tab">Categories</button>
      </div>
      <div class="controls__search">
        <span class="controls__search-icon" id="searchIconSlot"></span>
        <input type="search" id="searchInput" class="controls__search-input" placeholder="Search library" autocomplete="off" autocapitalize="none" autocorrect="off" inputmode="search" enterkeyhint="search" spellcheck="false">
        <button class="controls__search-clear icon-btn" id="searchClear" aria-label="Clear search" hidden></button>
      </div>
      <div class="controls__row" id="filtersRow">
        <div class="controls__tabs" role="tablist">
          <button class="controls__tab" data-tab="matched" role="tab">Matched</button>
          <button class="controls__tab" data-tab="unmatched" role="tab">Unmatched</button>
          <button class="controls__tab controls__tab--active" data-tab="all" role="tab">All</button>
        </div>
        <select id="sortSelect" class="controls__select" aria-label="Sort">
          <option value="name:asc">Name A-Z</option>
          <option value="name:desc">Name Z-A</option>
          <option value="duration:asc">Duration Short-Long</option>
          <option value="duration:desc">Duration Long-Short</option>
          <option value="avgSpeed:asc">Avg Speed Slow-Fast</option>
          <option value="avgSpeed:desc">Avg Speed Fast-Slow</option>
          <option value="maxSpeed:asc">Max Speed Slow-Fast</option>
          <option value="maxSpeed:desc">Max Speed Fast-Slow</option>
        </select>
        <select id="vrSelect" class="controls__select" aria-label="VR filter">
          <option value="all">All</option>
          <option value="vr">VR only</option>
          <option value="flat">Non-VR</option>
        </select>
      </div>
    </div>
    <main id="main" class="main"></main>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
