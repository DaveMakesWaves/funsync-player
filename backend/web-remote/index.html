<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FunSync">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FunSync Remote</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="256x256" href="./icons/icon-256.png">
  <link rel="apple-touch-icon" href="./icons/icon-256.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">

    <!-- Header: back + title + count + refresh.
         Per Hoober the top corners are red-zone; only "where am I" + the
         single emergency-exit (refresh) lives here. Frequent actions
         live in the content-action bar / bottom nav. -->
    <header class="header">
      <button class="header__back icon-btn" id="backBtn" aria-label="Back" hidden></button>
      <div class="header__titleblock">
        <h1 class="header__title" id="title"><span class="brand-accent">Fun</span>Sync</h1>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Location" hidden></nav>
      </div>
      <span class="header__count" id="count" aria-live="polite"></span>
      <button class="header__action icon-btn" id="refreshBtn" aria-label="Refresh library" title="Refresh library"></button>
    </header>

    <!-- Main scroll area. The toolbar lives INSIDE this container as
         a sticky child so the auto-hide-on-scroll behavior can use a
         pure GPU-accelerated transform without triggering layout
         reflow. Skeleton templates live at the end of body and are
         cloned into `#mainContent` while content is loading. -->
    <main id="main" class="main">

      <!-- Toolbar: search + active-filter chips + content-action bar.
           `position: sticky` (CSS) anchors it to the top of `.main`'s
           viewport. Sliding it up via `transform: translateY(-100%)`
           reveals the content that's scrolled-past underneath — same
           pattern as Twitter / Reddit mobile / Medium. -->
      <div class="toolbar" id="toolbar">

        <!-- Persistent search. Placeholder updates per mode (Library /
             Collections / Playlists / Categories) — Norman signifier. -->
        <div class="search-bar">
          <span class="search-bar__icon" id="searchIconSlot"></span>
          <input type="search" id="searchInput" class="search-bar__input"
                 placeholder="Search library"
                 autocomplete="off" autocapitalize="none" autocorrect="off"
                 inputmode="search" enterkeyhint="search" spellcheck="false"
                 aria-label="Search">
          <button class="search-bar__clear icon-btn" id="searchClear" aria-label="Clear search" hidden></button>
        </div>

        <!-- Active-filter chips (Nielsen #6 recognition; Shneiderman #6
             reversibility). Hidden when no filters are active so the
             toolbar collapses cleanly. -->
        <div class="filter-chips" id="filterChips" role="region" aria-label="Active filters" hidden></div>

        <!-- Content-action bar: sort / view / folder / filters.
             Below the search to keep the search at the top of the
             thumb-comfortable scroll zone; these less-frequent actions
             sit a row down. The filters icon shows an active-count
             badge so the user always knows how many filters are applied
             (Nielsen #1 visibility of system status). -->
        <div class="content-actions" id="contentActions">
          <button class="content-actions__btn" id="sortBtn" aria-haspopup="dialog">
            <span class="content-actions__icon" id="sortIconSlot"></span>
            <span class="content-actions__label">Sort</span>
          </button>
          <button class="content-actions__btn" id="viewToggle" aria-label="Toggle grid or list view" title="Toggle grid / list" aria-pressed="false">
            <span class="content-actions__icon" id="viewIconSlot"></span>
          </button>
          <button class="content-actions__btn" id="folderToggle" aria-label="Browse by folder" title="Browse by folder" aria-pressed="false">
            <span class="content-actions__icon" id="folderIconSlot"></span>
          </button>
          <button class="content-actions__btn content-actions__btn--filters" id="filtersBtn" aria-haspopup="dialog">
            <span class="content-actions__icon" id="filtersIconSlot"></span>
            <span class="content-actions__label">Filters</span>
            <span class="content-actions__badge" id="filtersBadge" aria-hidden="true" hidden></span>
          </button>
        </div>
      </div>

      <!-- Content wrapper. JS replaces this element's innerHTML/
           appendChild — the toolbar sibling above stays untouched. -->
      <div id="mainContent" class="main__content"></div>
    </main>

    <!-- Bottom nav (mobile / tablet) → left rail (≥1024px).
         Mode-switching is the most frequent navigation and lives in
         the easy-reach green zone (Hoober). Always-labelled (Nielsen #6
         recognition over recall). -->
    <nav class="nav-tabs" id="navTabs" role="tablist" aria-label="Modes">
      <button class="nav-tabs__tab" data-mode="library" role="tab" aria-selected="true">
        <span class="nav-tabs__icon" id="navLibraryIcon"></span>
        <span class="nav-tabs__label">Library</span>
      </button>
      <button class="nav-tabs__tab" data-mode="collections" role="tab" aria-selected="false">
        <span class="nav-tabs__icon" id="navCollectionsIcon"></span>
        <span class="nav-tabs__label">Collections</span>
      </button>
      <button class="nav-tabs__tab" data-mode="playlists" role="tab" aria-selected="false">
        <span class="nav-tabs__icon" id="navPlaylistsIcon"></span>
        <span class="nav-tabs__label">Playlists</span>
      </button>
      <button class="nav-tabs__tab" data-mode="categories" role="tab" aria-selected="false">
        <span class="nav-tabs__icon" id="navCategoriesIcon"></span>
        <span class="nav-tabs__label">Categories</span>
      </button>
    </nav>

    <!-- Filters sheet — bottom-sheet on phone, side drawer on tablet,
         inline panel on desktop. Backdrop click + Escape close (Nielsen #3
         user control). Focus trap when open (a11y). -->
    <div class="sheet" id="filterSheet" role="dialog" aria-modal="true" aria-labelledby="filterSheetTitle" hidden>
      <div class="sheet__backdrop" data-close-sheet></div>
      <div class="sheet__panel" role="document">
        <div class="sheet__handle" aria-hidden="true"></div>
        <header class="sheet__header">
          <h2 class="sheet__title" id="filterSheetTitle">Filters</h2>
          <button class="sheet__close icon-btn" data-close-sheet aria-label="Close filters"></button>
        </header>
        <div class="sheet__body">
          <section class="sheet__group">
            <h3 class="sheet__group-title">Match status</h3>
            <div class="sheet__options" role="radiogroup" aria-label="Match status" data-filter="tab">
              <label class="sheet__option"><input type="radio" name="tab" value="all"><span>All</span></label>
              <label class="sheet__option"><input type="radio" name="tab" value="matched"><span>Matched</span></label>
              <label class="sheet__option"><input type="radio" name="tab" value="unmatched"><span>Unmatched</span></label>
            </div>
          </section>
          <section class="sheet__group">
            <h3 class="sheet__group-title">VR</h3>
            <div class="sheet__options" role="radiogroup" aria-label="VR filter" data-filter="vr">
              <label class="sheet__option"><input type="radio" name="vr" value="all"><span>All</span></label>
              <label class="sheet__option"><input type="radio" name="vr" value="vr"><span>VR only</span></label>
              <label class="sheet__option"><input type="radio" name="vr" value="flat"><span>Non-VR</span></label>
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- Sort sheet — same shell as filter sheet, different content.
         Sort is conceptually distinct from filtering (doesn't reduce
         results) so it gets its own surface — Norman conceptual model. -->
    <div class="sheet" id="sortSheet" role="dialog" aria-modal="true" aria-labelledby="sortSheetTitle" hidden>
      <div class="sheet__backdrop" data-close-sheet></div>
      <div class="sheet__panel" role="document">
        <div class="sheet__handle" aria-hidden="true"></div>
        <header class="sheet__header">
          <h2 class="sheet__title" id="sortSheetTitle">Sort by</h2>
          <button class="sheet__close icon-btn" data-close-sheet aria-label="Close sort"></button>
        </header>
        <div class="sheet__body">
          <div class="sheet__options sheet__options--single" role="radiogroup" aria-label="Sort" data-filter="sort">
            <label class="sheet__option"><input type="radio" name="sort" value="name:asc"><span>Name A-Z</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="name:desc"><span>Name Z-A</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="dateAdded:desc"><span>Recently Added</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="dateAdded:asc"><span>Oldest First</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="duration:asc"><span>Duration Short-Long</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="duration:desc"><span>Duration Long-Short</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="avgSpeed:asc"><span>Avg Speed Slow-Fast</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="avgSpeed:desc"><span>Avg Speed Fast-Slow</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="maxSpeed:asc"><span>Max Speed Slow-Fast</span></label>
            <label class="sheet__option"><input type="radio" name="sort" value="maxSpeed:desc"><span>Max Speed Fast-Slow</span></label>
          </div>
        </div>
      </div>
    </div>

    <!-- Skeleton templates. Cloned by app.js on render-pending state.
         Match the shape of real cards / rows / grouping rows so the
         layout doesn't reflow when data arrives (§3.4.1a). -->
    <template id="tmpl-skeleton-card">
      <div class="card skeleton" aria-hidden="true">
        <div class="card__thumb skeleton__plate"></div>
        <div class="card__body">
          <div class="skeleton__line skeleton__line--85"></div>
          <div class="skeleton__line skeleton__line--60 skeleton__line--small"></div>
        </div>
      </div>
    </template>
    <template id="tmpl-skeleton-row">
      <div class="list__row skeleton" aria-hidden="true">
        <div class="list__thumb skeleton__plate"></div>
        <div class="list__info">
          <div class="skeleton__line skeleton__line--80"></div>
          <div class="skeleton__line skeleton__line--40 skeleton__line--small"></div>
        </div>
      </div>
    </template>
    <template id="tmpl-skeleton-grouping">
      <div class="grouping-row skeleton" aria-hidden="true">
        <div class="grouping-row__badge skeleton__plate"></div>
        <div class="grouping-row__info">
          <div class="skeleton__line skeleton__line--70"></div>
          <div class="skeleton__line skeleton__line--40 skeleton__line--small"></div>
        </div>
      </div>
    </template>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
